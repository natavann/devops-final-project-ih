name: Expensy CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./expensy_backend
        run: npm install

      - name: Build backend
        working-directory: ./expensy_backend
        env:
          DATABASE_URI: ${{ secrets.DATABASE_URI }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
        run: npm run build

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./expensy_frontend
        run: npm install

      - name: Build frontend
        working-directory: ./expensy_frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: npm run build

  deploy-to-aks:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name nataexpensyacr

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group nata-expensy-rg \
            --name nata-expensy-cluster

      - name: Deploy with Helm
        run: |
          helm upgrade --install expensy ./helm/expensy \
            --set secrets.databaseUri="${{ secrets.DATABASE_URI }}" \
            --set secrets.redisPassword="${{ secrets.REDIS_PASSWORD }}" \
            --set secrets.mongoRootUsername="${{ secrets.MONGO_ROOT_USERNAME }}" \
            --set secrets.mongoRootPassword="${{ secrets.MONGO_ROOT_PASSWORD }}"
